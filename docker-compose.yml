services:
  mongo:
    image: mongo:7
    container_name: mofin-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-mofin}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017" # expose to host for local tools (e.g. Compass); remove in production
    networks:
      - mofin-network
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mofin-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3000}
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongo:27017/${MONGO_DB:-mofin}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SALT: ${SALT}
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - mofin-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: mofin-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-4000}:4000"
    networks:
      - mofin-network

volumes:
  mongo_data:

networks:
  mofin-network:
    driver: bridge
